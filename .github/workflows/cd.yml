name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BACKEND_REPO: ehdrlf25-eng/RAG_DOC_BACKEND

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout backend deploy files
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BACKEND_REPO }}
          path: backend-deploy

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy frontend
        shell: pwsh
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          FRONTEND_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        run: |
          $defaultDir = Join-Path $env:GITHUB_WORKSPACE 'backend-deploy/deploy'
          $deployDir = if ($env:DEPLOY_PATH) { $env:DEPLOY_PATH } else { $defaultDir }
          if (-not (Test-Path $deployDir)) {
            throw "Deploy directory not found: $deployDir"
          }
          Set-Location $deployDir
          if (-not (Test-Path '.env') -and (Test-Path '.env.example')) {
            Copy-Item '.env.example' '.env'
            Write-Warning '.env created from .env.example — update DB/JWT values before use.'
          }
          docker compose -f docker-compose.redis.yml -f docker-compose.kafka.yml up -d
          docker compose -f docker-compose.yml pull frontend
          docker compose -f docker-compose.yml up -d frontend
          docker image prune -f
